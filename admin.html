<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | El Amanecer</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #0a0a0a;">

    <header id="main-header" style="background-color: #050505; border-bottom: 1px solid var(--oro);">
        <div class="logo">Administración</div>
        <nav><a href="index.html" style="background: var(--oro); color: black; padding: 8px 15px; border-radius: 4px; font-weight: bold;">🛒 Ver Tienda</a></nav>
    </header>

    <div style="padding: 120px 8% 50px;">
        <section id="admin-productos" style="margin-bottom: 80px;">
            <div class="form-container">
                <h2 style="color: var(--oro); text-align: center; margin-bottom: 30px;">Gestión de Catálogo (CRUD)</h2>
                <form id="form-producto" class="formulario" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="hidden" id="producto-id">
                    <input type="text" id="producto-nombre" placeholder="Nombre del Licor" required style="grid-column: 1/3;">
                    <input type="number" id="producto-precio" placeholder="Precio ($)" required>
                    <input type="text" id="producto-imagen" placeholder="URL Imagen (JPG/PNG)">
                    <button type="submit" id="btn-guardar-producto" class="boton-enviar" style="grid-column: 1/3; border-radius: 8px;">Guardar en Inventario</button>
                </form>
            </div>
        </section>

        <h2 style="color: #25d366; border-bottom: 1px solid #333; padding-bottom: 10px;">🛒 Pedidos de Compra Recibidos</h2>
        <div id="contenedor-pedidos" class="contenedor-grid" style="padding: 20px 0 60px;"></div>

        <h2 style="color: var(--oro); border-bottom: 1px solid #333; padding-bottom: 10px;">✉️ Mensajes de Contacto</h2>
        <div id="contenedor-mensajes" class="contenedor-grid" style="padding: 20px 0 60px;"></div>

        <h2 style="color: var(--blanco-marfil); border-bottom: 1px solid #333; padding-bottom: 10px;">📦 Inventario en Vivo</h2>
        <div id="contenedor-productos-admin" class="contenedor-grid" style="padding: 20px 0;"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
